{% extends 'layout.html' %}

{% block title %}تعديل بيانات المكوّن - المركز الوطني للإعلامية{% endblock %}

{% block content %}
<!-- Header Section -->
<div class="header-wrapper">
    <div class="header-title">
        <h1>تعديل بيانات المكوّن</h1>
        <p>تحديث معلومات المكوّن: {{ formateur.nom_prenom }}</p>
    </div>
    <div class="header-actions">
        <a href="{{ url_for('list_formateurs') }}" class="btn btn-secondary">
            <i class="fa-solid fa-arrow-left"></i>
            رجوع
        </a>
    </div>
</div>

<div class="glass-container" style="max-width: 600px; margin: 0 auto;">
    <div class="section-title">
        <h3>
            <i class="fa-solid fa-user-pen"></i>
            تعديل البيانات
        </h3>
    </div>
    
    <form action="{{ url_for('edit_formateur', nom_prenom=formateur.nom_prenom) }}" method="POST">
        <div class="form-group">
            <label for="nom_prenom_disp">الاسم واللقب (لا يمكن تعديله)</label>
            <input type="text" id="nom_prenom_disp" value="{{ formateur.nom_prenom }}" disabled style="background-color: var(--bg-primary); cursor: not-allowed; opacity: 0.7;">
        </div>
        
        <div class="form-group">
            <label for="specialite">التخصص <span style="color: var(--danger-color);">*</span></label>
            <input type="text" id="specialite" name="specialite" value="{{ formateur.specialite }}" required>
        </div>
        
        <div class="form-group">
            <label for="direction">الإدارة / القسم</label>
            <input type="text" id="direction" name="direction" value="{{ formateur.direction or '' }}">
        </div>
        
        <div class="form-group">
            <label for="entreprise">المؤسسة / الشركة <span style="color: var(--danger-color);">*</span></label>
            <input type="text" id="entreprise" name="entreprise" value="{{ formateur.entreprise }}" required>
        </div>
        
        <div style="display: flex; gap: 12px; margin-top: 20px;">
            <button type="submit" class="btn btn-primary" style="flex-grow: 1;">
                <i class="fa-solid fa-check"></i>
                تحديث التغييرات
            </button>
            <a href="{{ url_for('list_formateurs') }}" class="btn btn-secondary" style="flex-grow: 1; text-align: center;">
                إلغاء
            </a>
        </div>
    </form>
</div>
{% endblock %}
