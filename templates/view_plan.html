<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>المخطط البيداغوجي للدورة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-light p-5">
    <div class="container bg-white p-4 rounded shadow">
        <h1 class="mb-4 text-primary">المخطط التوجيهي الذكي للدورة التكوينية</h1>
        <hr>
        <div class="row mb-3">
            <div class="col-md-6"><strong>رقم العملية:</strong> {{ cycle.num_act }}</div>
            <div class="col-md-6"><strong>موضوع الدورة:</strong> {{ cycle.theme }}</div>
        </div>
        
        <div class="card my-4">
            <div class="card-header bg-dark text-white">المحتوى المقترح من طرف الذكاء الاصطناعي</div>
            <div class="card-body" id="markdown-content" style="white-space: pre-wrap;">
                {{ plan_content }}
            </div>
        </div>
        
        <a href="{{ url_for('list_cycles') }}" class="btn btn-secondary">العودة لقائمة الدورات</a>
        <button onclick="window.print()" class="btn btn-success">طباعة المخطط (PDF)</button>
    </div>

    <script>
        // Convertit le texte brut Markdown renvoyé par Gemini en HTML propre
        const contentDiv = document.getElementById('markdown-content');
        contentDiv.innerHTML = marked.parse(contentDiv.innerHTML);
    </script>
</body>
</html>
