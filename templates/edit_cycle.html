{% extends 'layout.html' %}

{% block title %}تعديل الدورة التكوينية - المركز الوطني للإعلامية{% endblock %}

{% block content %}
<!-- Header Section -->
<div class="header-wrapper">
    <div class="header-title">
        <h1>تعديل الدورة التكوينية</h1>
        <p>تحديث معلومات الدورة ذات رقم العملية: {{ cycle.num_act }}</p>
    </div>
    <div class="header-actions">
        <a href="{{ url_for('list_cycles') }}" class="btn btn-secondary">
            <i class="fa-solid fa-arrow-left"></i>
            رجوع
        </a>
    </div>
</div>

<div class="glass-container" style="max-width: 650px; margin: 0 auto;">
    <div class="section-title">
        <h3>
            <i class="fa-solid fa-calendar-minus"></i>
            تعديل بيانات الدورة
        </h3>
    </div>
    
    <form action="{{ url_for('edit_cycle', num_act=cycle.num_act) }}" method="POST" onsubmit="return validateForm()">
        <div class="form-group">
            <label for="num_act_disp">رقم العملية (لا يمكن تعديله)</label>
            <input type="text" id="num_act_disp" value="{{ cycle.num_act }}" disabled style="background-color: var(--bg-primary); cursor: not-allowed; opacity: 0.7;">
        </div>
        
        <div class="form-group">
            <label for="theme">الدورة التكوينية <span style="color: var(--danger-color);">*</span></label>
            <input type="text" id="theme" name="theme" value="{{ cycle.theme }}" required>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="date_deb">تاريخ البداية <span style="color: var(--danger-color);">*</span></label>
                <input type="date" id="date_deb" name="date_deb" value="{{ cycle.date_deb }}" required>
            </div>
            
            <div class="form-group">
                <label for="date_fin">تاريخ النهاية <span style="color: var(--danger-color);">*</span></label>
                <input type="date" id="date_fin" name="date_fin" value="{{ cycle.date_fin }}" required>
            </div>
        </div>
        
        <div class="form-group">
            <label for="form_1">مكون عدد 1</label>
            <select name="form_1" id="form_1">
                <option value="">إختر مكون</option>
                {% for f in formateurs %}
                    <option value="{{ f }}" {% if cycle.for1 == f %}selected{% endif %}>{{ f }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="form_2">مكون عدد 2</label>
            <select name="form_2" id="form_2">
                <option value="">إختر مكون</option>
                {% for f in formateurs %}
                    <option value="{{ f }}" {% if cycle.for2 == f %}selected{% endif %}>{{ f }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="form_3">مكون عدد 3</label>
            <select name="form_3" id="form_3">
                <option value="">إختر مكون</option>
                {% for f in formateurs %}
                    <option value="{{ f }}" {% if cycle.for3 == f %}selected{% endif %}>{{ f }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="num_salle">رقم القاعة <span style="color: var(--danger-color);">*</span></label>
            <select name="num_salle" id="num_salle" required>
                <option value="">إختر القاعة</option>
                {% for i in range(1, 11) %}
                    <option value="{{ i }}" {% if cycle.num_salle|string == i|string %}selected{% endif %}>قاعة التدريب {{ i }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div style="display: flex; gap: 12px; margin-top: 20px;">
            <button type="submit" class="btn btn-primary" style="flex-grow: 1;">
                <i class="fa-solid fa-check"></i>
                تحديث التغييرات
            </button>
            <a href="{{ url_for('list_cycles') }}" class="btn btn-secondary" style="flex-grow: 1; text-align: center;">
                إلغاء
            </a>
        </div>
    </form>
</div>
{% endblock %}

<script>
function validateForm() {
    const dateDeb = document.getElementById('date_deb').value;
    const dateFin = document.getElementById('date_fin').value;
    if (new Date(dateFin) < new Date(dateDeb)) {
        showToast('خطأ في التاريخ', 'تاريخ نهاية الدورة لا يمكن أن يكون قبل تاريخ بدايتها.', 'danger');
        return false;
    }
    return true;
}

// Conflict check on edit
let conflictTimer = null;
async function checkConflict() {
    clearTimeout(conflictTimer);
    conflictTimer = setTimeout(async () => {
        const salle = document.getElementById('num_salle').value;
        const deb = document.getElementById('date_deb').value;
        const fin = document.getElementById('date_fin').value;
        const alert = document.getElementById('conflictAlert');
        const msg = document.getElementById('conflictMsg');
        if (!salle || !deb || !fin || !alert) return;
        try {
            const res = await fetch(`/api/check-conflict?num_salle=${salle}&date_deb=${deb}&date_fin=${fin}&exclude={{ cycle.num_act|e }}`);
            const data = await res.json();
            if (data.conflict) {
                alert.className = 'conflict-alert show';
                msg.textContent = data.message;
            } else {
                alert.className = 'conflict-alert conflict-ok show';
                msg.textContent = 'القاعة متاحة في هذه الفترة ✓';
            }
        } catch(e) {}
    }, 600);
}
</script>
